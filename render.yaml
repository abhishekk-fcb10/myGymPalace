services:
  - type: web
    name: mygympalace
    runtime: static
    plan: free
    buildCommand: "echo 'No build step — static site'"
    staticPublishPath: ./
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Cache-Control
        value: public, max-age=300
    routes:
      - type: rewrite
        source: /
        destination: /index.html
